<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h3>Rock Paper Scissors Game</h3>
    <!--rock---->

    <button
      onclick="
        const computerMove = pickcomputerMove();

        let result = '';

        if (computerMove === 'rock') {
          result = 'tie';
        } else if (computerMove === 'paper') {
          result = 'you lose';
        } else {
          result = 'you win';
        }
        document.getElementById('result').textContent =
          'Computer picked ' + computerMove + '. ' + result;
      "
    >
      Rock
    </button>

    <!--paper---->
    <button
      onclick="
        const computerMove = pickcomputerMove();

        let result = '';

        if (computerMove === 'rock') {
          result = 'tie';
        } else if (computerMove === 'paper') {
          result = 'you lose';
        } else {
          result = 'you win';
        }
        document.getElementById('result').textContent =
          'Computer picked ' + computerMove + '. ' + result;
      "
    >
      Paper
    </button>

    <!--scissors---->
    <button
      onclick="
        const computerMove = pickcomputerMove();

        let result = '';

        if (computerMove === 'rock') {
          result = 'tie';
        } else if (computerMove === 'paper') {
          result = 'you lose';
        } else {
          result = 'you win';
        }
        document.getElementById('result').textContent =
          'Computer picked ' + computerMove + '. ' + result;
      "
    >
      Scissors
    </button>

    <script>
      function pickcomputerMove() {

        const randnumber = Math.random()
        
        let computerMove = "";

        if (randnumber >= 0 && randnumber < 1 / 3) {
          computerMove = "rock";
        } else if (randnumber >= 1 / 3 && randnumber < 2 / 3) {
          computerMove = "paper";
        } else if (randnumber >= 2 / 3 && randnumber < 1) {
          computerMove = "scissors";
        }
        return computerMove;
      }
    </script>

    <p id="result"></p>
  </body>
</html>
