<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
</head>
<style>
    .grid-section{
        text-align: center;
        padding: 40px;
        
    }

    .grid-container{
        display: grid;
        grid-template-columns: repeat( auto-fit, minmax(250px, 1fr) );
        column-gap: 20px;
        row-gap: 20px;
        gap: 20px;
        margin-top: 40px;
    }
    .grid-item{
        background-color: blue;
        color: white;
        font-size: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 200px;
    }
    .red{
        background-color: red;
    }
    .blue{
        background-color: blue;
    }
    .yellow{
        background-color: yellow;
    }
    .crimson{
        background-color: crimson;
    }
    .green{
        background-color: green;
    }
    .gray{
        background-color: gray;
    }
    .skyblue{
        background-color: skyblue;
    }
    .orange{
        background-color: orange;
    }

</style>

<body>
    <section class="grid-section">
        <h2>grid practice</h2>
        <p>Grid technique is all about creating a two-dimensional layout system, allowing you to arrange elements in rows and columns.  </p>
        <div class="grid-container">
            <div class="grid-item red">GRID A</div>
            <div class="grid-item blue">GRID B</div>
            <div class="grid-item yellow">GRID C</div>
            <div class="grid-item crimson">GRID D</div>
            <div class="grid-item green">GRID  E</div>
            <div class="grid-item gray">GRID F</div>
            <div class="grid-item skyblue">GRID G</div>
            <div class="grid-item orange">GRID H</div>
        </div>
        
    </section>
</body>
</html>
