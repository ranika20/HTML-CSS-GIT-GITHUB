<!DOCTYPE html>
<html leng="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>flex</title>
  </head>
  <style>
    .flex-section
    {text-align: center;
     padding: 40px;

    }
    .flex-container{
        display: flex;
        justify-content: space-around;
        margin-top: 40px;
        gap: 20px;
    }
    .box{
        width: 100px;
        height: 100px;
        background-color: blue;
        color: white;
        font-size: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
    }


  </style>
  <body>
    
    <section class="flex-section">
        <h2>flex practice</h2>
        <p>flex technique is all about arranging elements in a single direction, either horizontally or vertically.</p>
        <p>this is another paragraph</p>

        <div class="flex-container">
            <div class="box">box1</div>
            <div class="box">box2</div>
            <div class="box">box3</div>
        </div>
    </section>

  </body>
    </html>
